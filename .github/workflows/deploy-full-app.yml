name: Deploy Full App Bundle

on:
  push:
    branches:
      - main
      - master
      - work
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all workspaces
        run: pnpm build

      - name: Create deploy bundle
        run: |
          mkdir -p dist
          tar -czf dist/jm-adm-full-app-${{ github.sha }}.tar.gz \
            apps \
            packages \
            prisma \
            scripts \
            docker-compose.yml \
            package.json \
            pnpm-lock.yaml \
            pnpm-workspace.yaml \
            .env.example \
            README.md

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: jm-adm-full-app-${{ github.sha }}
          path: dist/*.tar.gz

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/work'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: deploy-${{ github.run_id }}
          name: JM ADM Deploy ${{ github.run_number }}
          body: |
            Bundle completo de la app generado automáticamente.
            Commit: `${{ github.sha }}`
            Run ID: `${{ github.run_id }}`
          files: dist/*.tar.gz
